name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run library tests
        run: cargo test --lib --workspace --all-features

      - name: Run integration tests
        run: cargo test --test '*' --workspace --all-features

      - name: Run doctests
        run: cargo test --doc --workspace --all-features

      - name: Build all examples
        run: cargo build --examples --workspace --all-features

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Validates the published-crate MSRV (declared in [workspace.package]
      # rust-version). This pins the toolchain to the declared floor so the
      # advertised MSRV can't silently drift. Scope note: this checks the
      # publishable surface only (`-p tower-resilience --all-features`, all
      # edition 2021), NOT the repo-root `tower-resilience-tests` harness,
      # which is edition 2024 (publish = false) and is not part of the MSRV
      # contract.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check -p tower-resilience --all-features

  contract-lints:
    name: Source Contract Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Catches the clone-in-call anti-pattern that violates Tower's Service
      # contract (#286). The Service contract permits `call` to panic if
      # invoked on an instance whose `poll_ready` was not driven to
      # `Poll::Ready(Ok(()))`. Cloning self.inner in call() and moving the
      # unreadied clone into the future violates this for any compliant
      # stateful inner middleware (tower::limit::ConcurrencyLimit,
      # tower::buffer::Buffer, tower::load_shed::LoadShed, etc.). The
      # contract-compliant form uses `std::mem::replace` so the readied
      # original moves into the future and a fresh clone stays on &mut self.
      #
      # See https://docs.rs/tower-service/0.3.3/tower_service/trait.Service.html#be-careful-when-cloning-inner-services
      - name: Forbid clone-in-call anti-pattern
        run: |
          if git grep -nE 'let mut [a-zA-Z_][a-zA-Z0-9_]* = self\.inner\.clone\(\);' -- 'crates/**/*.rs'; then
            echo ""
            echo "Found clone-in-call anti-pattern (#286). Use std::mem::replace instead:"
            echo "  let clone = self.inner.clone();"
            echo "  let mut inner = std::mem::replace(&mut self.inner, clone);"
            exit 1
          fi

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Scans Cargo.lock against the RustSec advisory database. The lock is
      # currently clean (0 vulnerabilities, 0 warnings) thanks to the loosened
      # `tokio = "1"` workspace pin letting transitive crates (notably
      # `bytes >= 1.10.2` for RUSTSEC-2026-0007) float to fixed versions. No
      # `--ignore` flags are needed today; add one per advisory here (with a
      # rationale comment) only if a future advisory has no available
      # non-breaking fix.
      - name: Run cargo audit
        run: cargo audit
